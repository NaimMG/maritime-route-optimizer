project:
  name: "maritime-route-optimizer"
  version: "0.1.0"
  seed: 42

data:
  raw_path: "data/raw/"
  processed_path: "data/processed/"
  external_path: "data/external/"
  ais_filename: "ais_data.csv"
  min_speed_knots: 0.5        # Ignore vessels that are stopped
  max_speed_knots: 30.0       # Filter outliers
  min_trajectory_points: 10   # Minimum points per vessel trip

graph:
  ports_filename: "data/external/world_ports.csv"
  max_edge_distance_km: 2000  # Max distance between connected ports
  min_historical_routes: 5    # Min routes to create an edge

model:
  hidden_channels: 64
  num_layers: 3
  dropout: 0.2
  learning_rate: 0.001
  batch_size: 32
  epochs: 100
  val_split: 0.2

optimizer:
  heuristic_weight: 1.0       # A* heuristic weight (1.0 = admissible)
  cost_weights:
    distance: 0.4
    weather: 0.35
    fuel: 0.25

api:
  host: "0.0.0.0"
  port: 8000
  reload: true